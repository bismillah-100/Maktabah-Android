name: Build & Release Android App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

env:
  TAG_NAME: ${{ github.event.inputs.tag_name || github.ref_name }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update version name in build.gradle.kts
        run: |
          VERSION_NAME="${{ env.TAG_NAME }}"
          VERSION_NAME="${VERSION_NAME#v}"
          sed -i "s/versionName = \".*\"/versionName = \"$VERSION_NAME\"/g" app/build.gradle.kts

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Decode Keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 --decode --ignore-garbage > app/release-key.jks

      - name: Decode Google Services Config
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Create local.properties
        run: |
          cat <<EOF > local.properties
          signing.storeFile=release-key.jks
          signing.storePassword=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          signing.keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}
          signing.keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}
          cloudflare.worker.url=${{ secrets.CLOUDFLARE_WORKER_URL }}
          firebase.rtdb.url=${{ secrets.FIREBASE_RTDB_URL }}
          cloudkit.container.id=${{ secrets.CLOUDKIT_CONTAINER_ID }}
          github.kitab.version.url=https://cdn.jsdelivr.net/gh/bismillah-100/Kitab@main/version.txt
          github.kitab.index.url=https://cdn.jsdelivr.net/gh/bismillah-100/Kitab@main/index.json
          EOF

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          CLOUDKIT_RELEASE_TOKEN: ${{ secrets.CLOUDKIT_RELEASE_TOKEN }}
        run: ./gradlew assembleRelease

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/Maktabah-Android-${{ env.TAG_NAME }}.apk

      - name: Check if Pre-release
        id: check_prerelease
        run: |
          if [[ "${{ env.TAG_NAME }}" =~ - ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          draft: false
          prerelease: ${{ steps.check_prerelease.outputs.is_prerelease }}
          files: app/build/outputs/apk/release/Maktabah-Android-${{ env.TAG_NAME }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
