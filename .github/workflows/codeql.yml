name: "CodeQL Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 1' # Jalankan setiap hari Senin

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java-kotlin' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Create dummy google-services.json
      run: |
        mkdir -p app
        cat <<EOF > app/google-services.json
        {
          "project_info": {
            "project_number": "123456789",
            "project_id": "maktabah-dummy",
            "storage_bucket": "maktabah-dummy.appspot.com"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:123456789:android:123456789",
                "android_client_info": {
                  "package_name": "com.maktabah.android"
                }
              },
              "oauth_client": [],
              "api_key": [
                {
                  "current_key": "dummy-api-key"
                }
              ],
              "services": {}
            },
            {
              "client_info": {
                "mobilesdk_app_id": "1:123456789:android:123456789",
                "android_client_info": {
                  "package_name": "com.maktabah.android.debug"
                }
              },
              "oauth_client": [],
              "api_key": [
                {
                  "current_key": "dummy-api-key"
                }
              ],
              "services": {}
            }
          ],
          "configuration_version": "1"
        }
        EOF

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        build-mode: manual
        config-file: .github/codeql/codeql-config.yml

    - name: Build Code for CodeQL Analysis
      run: |
        chmod +x gradlew
        ./gradlew compileDebugSources --no-daemon

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
